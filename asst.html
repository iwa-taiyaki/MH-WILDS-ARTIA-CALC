<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASST | MHWilds Simulation Tool</title>
    <link rel="icon" href="icon/title.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/results.css">
    <style>
        :root {
            --bg-color: #0c111d;
            --panel-bg: #141a26;
            --accent-color: #ffcc00;
            --text-color: #eee;
            --text-muted: #aaa;
            --border-color: #2a3448;
            --highlight-bg: #1e2636;
            --skill-lv-color: #ffcc00;
            --weapon-color: #66ccff;
            --color-series: #ff9900;
            --color-group: #00cc88;
            --font-main: 'Outfit', sans-serif;
            --font-serif: 'Times New Roman', "MS Mincho", serif;

            /* Legacy vars for compatibility if any */
            --color-primary: #3399ff;
            --color-accent: #ffcc00;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-serif);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }


        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .search-status {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        #status-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--color-primary);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--color-primary);
        }

        .input-group {
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slots-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }
        .slots-stack .slots-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-val {
            font-weight: bold;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }


        .target-skill-badge {
            background: rgba(51, 153, 255, 0.15);
            border: 1px solid rgba(51, 153, 255, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #fff;
            margin-right: 0.5rem;
            display: inline-block;
            margin-bottom: 0.3rem;
            font-variant-numeric: tabular-nums;
        }

        .skill-summary-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
        }

        .btn {
            background: var(--color-secondary);
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--color-primary);
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .deco-label {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-accent);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.3rem;
            display: inline-block;
            margin-top: 0.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--color-text-muted);
        }

        /* Skill Selection Panel Styles from index.html */
        .skills-panel {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--color-primary);
            border-bottom: 1px solid rgba(51, 153, 255, 0.3);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            font-family: var(--font-serif);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #skills-selection-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem 1rem;
            max-height: 75vh;
            overflow-y: auto;
            padding-right: 0.8rem;
            scrollbar-width: thin;
            scrollbar-color: var(--color-primary) transparent;
        }

        #skills-selection-list::-webkit-scrollbar {
            width: 6px;
        }

        #skills-selection-list::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 10px;
        }

        .skill-category-title {
            grid-column: 1 / -1;
            font-size: 0.85rem;
            color: var(--color-primary);
            background: rgba(51, 153, 255, 0.1);
            padding: 0.4rem 0.8rem;
            margin: 0.8rem 0 0.4rem 0;
            border-left: 3px solid var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skill-subcategory-title {
            grid-column: 1 / -1;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin: 1rem 0 0.4rem 0;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .skill-selector-row {
            display: grid;
            grid-template-columns: 1fr 60px;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .skill-selector-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .skill-selector-row.selected {
            background: rgba(51, 153, 255, 0.1);
            border-color: rgba(51, 153, 255, 0.4);
        }

        .skill-selector-row.selected .skill-name {
            color: var(--color-primary);
            font-weight: bold;
        }

        .skill-name {
            font-weight: 500;
            font-size: 0.8rem;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skill-selector-row select {
            padding: 0.2rem;
            font-size: 0.75rem;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            border-radius: 3px;
            outline: none;
        }

        .skill-search-container {
            margin-bottom: 1rem;
            background: var(--color-surface);
            padding: 0.5rem 0;
        }

        #skill-search-input {
            width: 100%;
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-border);
            color: #fff;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        #active-skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
            min-height: 20px;
        }

        .active-skill-badge {
            background: rgba(51, 153, 255, 0.15);
            border: 1px solid rgba(51, 153, 255, 0.4);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 1000px) {
            .settings-grid {
                grid-template-columns: 1fr !important;
                gap: 1.5rem !important;
            }
        }

        /* 武器装飾品ピッカー追加スタイル */
        #deco-picker-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }
        #deco-picker-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 500px;
            max-height: 80vh;
            background: var(--panel-bg);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            flex-direction: column;
            z-index: 1001;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #deco-picker-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        #deco-picker-search {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        #deco-picker-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 5px;
        }
        .deco-pick-item {
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .deco-pick-item:hover {
            background: rgba(255, 204, 0, 0.1);
            border-color: var(--accent-color);
        }
        .deco-pick-item.none {
            color: #ff6666;
            text-align: center;
            border-style: dashed;
        }

        .weapon-deco-picker {
            padding: 6px 10px;
            background: #000;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .weapon-deco-picker:hover {
            border-color: var(--accent-color);
            color: #fff;
        }
        .weapon-deco-picker::after {
            content: '▼';
            font-size: 0.6rem;
            opacity: 0.5;
        }

        .slots-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }
        .slots-stack .slots-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div
            style="position: absolute; top: 10px; left: 20px; font-size: 0.65rem; color: var(--color-text-muted); pointer-events: none; z-index: 100;">
            ver.1.01.003</div>
        <nav class="site-nav container">
            <a href="index.html" class="logo-link">
                <img src="icon/title.png" alt="ASST" class="site-logo">
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">ダメージ計算</a>
                <a href="asst.html" class="nav-link active">ASST</a>
                <a href="damage_talisman.html" class="nav-link">お守り検索</a>
                <a href="talisman.html" class="nav-link">お守りリスト</a>
                <a href="database.html" class="nav-link">データベース</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <!-- MySet Management Section (Shared with Calculator) -->
        <div class="search-status" style="flex-direction: column; align-items: stretch; gap: 0.8rem; border: 1px dashed rgba(255, 215, 0, 0.4); background: rgba(255, 215, 0, 0.02); margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="font-size: 0.8rem; color: var(--accent-color); font-weight: bold; font-family: var(--font-serif); letter-spacing: 0.1em; text-transform: uppercase;">MySet | 保存済み構成の管理</label>
                <div style="font-size: 0.7rem; color: var(--text-muted);">
                    現在の構成: <span id="current-myset-display" style="color: var(--accent-color); font-weight: bold;">(未保存)</span>
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <select id="myset-list" style="flex: 1; height: 32px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.8rem; outline: none; border-radius: 4px;">
                    <option value="">マイセット選択...</option>
                </select>
                <button id="btn-load-myset" class="btn" style="height: 32px; font-size: 0.75rem; padding: 0 1rem; background: rgba(51, 153, 255, 0.1); border: 1px solid rgba(51, 153, 255, 0.3); color: #66ccff;">読込</button>
                <button id="btn-save-myset" class="btn" style="height: 32px; font-size: 0.75rem; padding: 0 1rem; background: rgba(255, 153, 0, 0.1); border: 1px solid rgba(255, 153, 0, 0.3); color: #ff9900;">保存</button>
                <button id="btn-delete-myset" class="btn" style="height: 32px; font-size: 0.75rem; padding: 0 1rem; background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.3); color: #ff5050;">削除</button>
            </div>
        </div>

        <div class="search-status" style="flex-direction: column; align-items: stretch; gap: 1rem;">
            <div class="settings-grid"
                style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 0.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);">
                <!-- Weapon Settings -->
                <div class="input-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold;">武器設定</label>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <label style="font-size: 0.65rem; color: var(--color-text-muted); width: 45px;">シリーズ</label>
                            <select id="weapon-ss"
                                style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="">自動選択</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 0.4rem; align-items: center;">
                            <label style="font-size: 0.65rem; color: var(--color-text-muted); width: 45px;">グループ</label>
                            <select id="weapon-gs"
                                style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="">自動選択</option>
                            </select>
                        </div>
                        <div style="margin-top: 4px; border-top: 1px dashed #333; padding-top: 8px;">
                            <label style="font-size: 0.7rem; color: var(--color-accent); font-weight: bold; display: block; margin-bottom: 4px;">武器装飾品 (スロットサイズ設定)</label>
                            <div style="display: flex; flex-direction: column; gap: 6px;">
                                <div style="display: flex; gap: 4px; align-items: center;">
                                    <select id="wslot-1" class="wslot-size-select" style="width: 52px; height: 28px; font-size: 0.8rem;">
                                        <option value="3">[3]</option><option value="2">[2]</option><option value="1">[1]</option><option value="0">なし</option>
                                    </select>
                                    <div class="weapon-deco-picker" id="wdeco-1" style="flex: 1;">自動選択</div>
                                </div>
                                <div style="display: flex; gap: 4px; align-items: center;">
                                    <select id="wslot-2" class="wslot-size-select" style="width: 52px; height: 28px; font-size: 0.8rem;">
                                        <option value="3">[3]</option><option value="2">[2]</option><option value="1">[1]</option><option value="0">なし</option>
                                    </select>
                                    <div class="weapon-deco-picker" id="wdeco-2" style="flex: 1;">自動選択</div>
                                </div>
                                <div style="display: flex; gap: 4px; align-items: center;">
                                    <select id="wslot-3" class="wslot-size-select" style="width: 52px; height: 28px; font-size: 0.8rem;">
                                        <option value="3">[3]</option><option value="2">[2]</option><option value="1">[1]</option><option value="0">なし</option>
                                    </select>
                                    <div class="weapon-deco-picker" id="wdeco-3" style="flex: 1;">自動選択</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Talisman Settings -->
                <div class="input-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold;">お守り設定</label>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="talisman-auto" checked>
                            <label for="talisman-auto"
                                style="font-size: 0.7rem; color: var(--color-accent); cursor: pointer;">自動選択</label>
                        </div>
                    </div>
                    <div id="talisman-selector-ui"
                        style="display: flex; flex-direction: column; gap: 0.4rem; opacity: 0.5; pointer-events: none;">
                        <div style="display: flex; gap: 0.4rem;">
                            <select id="talisman-rare"
                                style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="any">全レア度</option>
                                <option value="5">RARE 5</option>
                                <option value="6">RARE 6</option>
                                <option value="7">RARE 7</option>
                                <option value="8">RARE 8</option>
                            </select>
                            <select id="talisman-slot-select"
                                style="flex: 1; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                                <option value="any">スロット指定</option>
                            </select>
                        </div>
                        <select id="talisman-skill-1"
                            style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;">
                            <option value="any">第1スキル：指定なし</option>
                        </select>
                        <select id="talisman-skill-2"
                            style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;">
                            <option value="any">第2スキル：指定なし</option>
                        </select>
                        <select id="talisman-skill-3"
                            style="width: 100%; height: 28px; background: #000; color: #fff; border: 1px solid #444; font-size: 0.75rem;">
                            <option value="any">第3スキル：指定なし</option>
                        </select>
                    </div>
                    <div style="margin-top: 0.5rem;">
                        <button id="btn-talisman-fav" class="btn"
                            style="width: 100%; height: 32px; font-size: 0.75rem; border: 1px solid rgba(255, 215, 0, 0.4); color: #ffcc00; display: flex; align-items: center; justify-content: center; gap: 6px; background: rgba(255, 215, 0, 0.05); transition: all 0.2s;">
                            <span>★</span> お気に入りから検索
                        </button>
                    </div>
                </div>

                <!-- Combined Filters & Sort -->
                <div class="input-group">
                    <label
                        style="font-size: 0.75rem; color: var(--color-primary); font-weight: bold; margin-bottom: 0.5rem; display: block;">詳細フィルター
                        & ソート</label>
                    <div style="margin-bottom: 0.8rem;">
                        <label
                            style="font-size: 0.65rem; color: var(--color-accent); display: block; margin-bottom: 4px;">ソート条件</label>
                        <select id="search-sort-type"
                            style="width: 100%; height: 28px; background: #222; color: #fff; border: 1px solid #444; font-size: 0.75rem; border-radius: 4px;">
                            <option value="exp">期待値順 (降順)</option>
                            <option value="def">防御力順 (降順)</option>
                            <option value="res0">火耐性順 (降順)</option>
                            <option value="res1">水耐性順 (降順)</option>
                            <option value="res2">雷耐性順 (降順)</option>
                            <option value="res3">氷耐性順 (降順)</option>
                            <option value="res4">龍耐性順 (降順)</option>
                        </select>
                    </div>

                    <div id="res-filter-controls">
                        <label
                            style="font-size: 0.65rem; color: var(--color-accent); display: block; margin-bottom: 4px;">必要な属性耐性値</label>
                        <div id="active-res-filters"
                            style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px;">
                            <!-- Dynamic filter rows -->
                        </div>
                        <select id="add-res-filter"
                            style="width: 100%; height: 32px; background: #111; color: #aaa; border: 1px solid #333; font-size: 0.75rem; cursor: pointer; padding: 0 8px; vertical-align: middle;">
                            <option value="">＋ フィルターを追加...</option>
                            <option value="0">火耐性</option>
                            <option value="1">水耐性</option>
                            <option value="2">雷耐性</option>
                            <option value="3">氷耐性</option>
                            <option value="4">龍耐性</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button id="btn-re-search" class="btn"
                        style="width: 100%; height: 60px; border: 1px solid var(--color-accent); color: var(--color-accent); background: transparent;">設定を反映して再検索</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="status-info">
                    <div id="status-text"><span class="loader"></span>検索対象の条件を確認中...</div>
                    <div class="progress-bar-container">
                        <div id="progress-bar"></div>
                    </div>
                </div>
                <div id="result-count"
                    style="margin-left: 2rem; font-weight: bold; font-size: 1.2rem; color: var(--color-primary);">
                    0 sets
                </div>
            </div>
            <div id="target-summary"
                style="margin-top: 1rem; border-top: 1px dotted rgba(255,255,255,0.1); padding-top: 0.8rem; display: flex; flex-wrap: wrap;">
                <!-- スキル一覧がここに表示されます -->
            </div>
        </div>

        <!-- Skill Selection Panel -->
        <section class="skills-panel">
            <h2 class="panel-title">目標スキル設定</h2>

            <div id="active-skills-container"
                style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);">
                <div
                    style="font-size: 0.85rem; font-weight: bold; color: var(--color-primary); margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
                    <span>選択中のスキル</span>
                    <button id="btn-clear-skills"
                        style="background: transparent; border: 1px solid rgba(255,0,0,0.3); color: #ff6666; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;">クリア</button>
                </div>
                <div id="active-skills-list"></div>
            </div>

            <div class="skill-search-container">
                <input type="text" id="skill-search-input" placeholder="スキル名称で検索...">
            </div>

            <div id="skills-selection-list"></div>
        </section>

        <div id="results-container" class="results-grid">
            <!-- 結果がここに動的に生成されます -->
        </div>

        <div id="empty-message" class="empty-state" style="display: none;">
            <p>指定されたスキル構成を満たす組み合わせは見つかりませんでした。</p>
            <p style="font-size: 0.8rem; margin-top: 1rem;">スキルのレベルを下げるか、お守りの条件を緩和して再検索してください。</p>
        </div>
    </div>

    <!-- 武器装飾品ピッカー用モーダル -->
    <div id="deco-picker-overlay"></div>
    <div id="deco-picker-modal">
        <div id="deco-picker-header">
            <div style="font-size: 0.85rem; color: var(--color-primary); font-weight: bold;">装飾品を選択 (スロット[3]以下)</div>
            <input type="text" id="deco-picker-search" placeholder="スキル名で検索...">
        </div>
        <div id="deco-picker-list">
            <!-- JSで動的に生成 -->
        </div>
        <div style="padding: 10px; border-top: 1px solid #333; text-align: right;">
            <button class="btn" id="deco-picker-close" style="padding: 4px 12px; font-size: 0.7rem;">閉じる</button>
        </div>
    </div>

    <script type="module" src="js/asst.js"></script>
</body>

</html>
