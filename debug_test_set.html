<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>装備検証ページ (本サイト完全準拠) | MHWilds Simulation</title>
    <style>
        :root {
            --bg-color: #0c111d;
            --panel-bg: #141a26;
            --accent-color: #ffcc00;
            --text-color: #eee;
            --text-muted: #aaa;
            --border-color: #2a3448;
            --highlight-bg: #1e2636;
            --skill-lv-color: #ffcc00;
            --weapon-color: #66ccff;
            --color-series: #ff9900;
            --color-group: #00cc88;
            --font-serif: 'Times New Roman', "MS Mincho", serif;
            --font-main: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 本サイト asst.html の結果表示CSSを完全に移植 */
        .result-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 1040px;
            margin: 0 auto;
        }

        .result-header {
            padding: 12px 30px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            background: transparent;
        }

        .set-id-tag {
            margin: 0;
            font-size: 1.8rem;
            color: var(--accent-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: var(--font-serif);
        }

        .defense-info {
            font-size: 1rem;
            font-variant-numeric: tabular-nums;
            color: #ccc;
            font-family: var(--font-serif);
        }

        .result-body {
            padding: 30px;
            display: grid;
            grid-template-columns: 460px 1fr;
            gap: 40px;
        }

        .equipment-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .equip-item {
            position: relative;
            padding-left: 15px;
            border-left: 3px solid transparent;
        }

        .equip-label {
            position: absolute;
            left: -25px;
            top: 4px;
            color: var(--weapon-color);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .equip-name {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #fff;
            font-family: var(--font-serif);
        }

        .equip-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: var(--font-serif);
        }

        .native-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            font-family: var(--font-serif);
        }

        .piece-skill-label { color: #ccc; }
        .special-ss { color: var(--color-series); }
        .special-gs { color: var(--color-group); }

        .slots-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .slot-box {
            background: #000;
            padding: 1px 6px;
            border: 1px solid #555;
            border-radius: 3px;
            color: var(--accent-color);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .deco-label {
            color: #b0c4de;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(176, 196, 222, 0.3);
        }

        .skill-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            font-family: var(--font-serif);
        }

        .skill-table th {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding: 10px 5px;
            color: var(--weapon-color);
            font-weight: normal;
        }

        .skill-table td {
            padding: 8px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .skill-table .skill-name-cell {
            text-align: left;
            font-weight: bold;
            color: #fff;
            padding-left: 10px;
        }

        .total-cell {
            color: var(--skill-lv-color);
            font-weight: bold;
            font-size: 1rem;
        }

        .val-none { color: #333; }
        .empty-cell { color: #333; }

    </style>
</head>
<body>
    <div id="results-container"></div>

    <script type="module">
        import { ARMOR } from './js/data/armor.js';
        import { DECORATIONS } from './js/data/decorations.js';
        import { SKILLS } from './js/data/skills.js';

        const SKILL_NAME_TO_ID = Object.fromEntries(SKILLS.map(s => [s.name, s.id]));
        const SKILL_BY_ID = Object.fromEntries(SKILLS.map(s => [s.id, s]));

        // asst.js の renderResult ロジックを完全に再現
        function renderResult(h, c, a, w, l, t, wSlots, wSkills, assignment, idx, autoSS, autoGS) {
            const resultsContainer = document.getElementById('results-container');
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const armorItems = [h, c, a, w, l];
            const weaponNameDisplay = (autoSS || autoGS || h.ss || h.gs) ? "巨戟アーティア" : "その他";

            // 計算用マトリックス (本サイトと同じ +1pt ロジック)
            const matrix = {};
            const getM = (sid) => matrix[sid] || (matrix[sid] = { weapon: 0, 0: 0, 1: 0, 2: 0, 3: 0, 4: 0, talisman: 0, total: 0 });

            // 武器固定スキル
            Object.entries(wSkills).forEach(([sid, pts]) => {
                getM(sid).weapon += pts; getM(sid).total += pts;
            });
            if (autoSS) { getM(autoSS).weapon += 1; getM(autoSS).total += 1; }
            if (autoGS) { getM(autoGS).weapon += 1; getM(autoGS).total += 1; }
            
            // 装飾品
            assignment.forEach(ass => {
                if (ass.deco.sk) ass.deco.sk.forEach(s => {
                    const sid = SKILL_NAME_TO_ID[s.n];
                    if (sid) {
                        if (ass.piece === 'weapon') getM(sid).weapon += s.l;
                        else if (ass.piece === 'talisman') getM(sid).talisman += s.l;
                        else getM(sid)[ass.piece] += s.l;
                        getM(sid).total += s.l;
                    }
                });
            });

            // 防具・護石
            armorItems.forEach((item, pIdx) => {
                if (item.sk) item.sk.forEach(s => { const sid = SKILL_NAME_TO_ID[s.n]; if (sid) { getM(sid)[pIdx] += s.l; getM(sid).total += s.l; } });
                if (item.ss) { const sid = SKILL_NAME_TO_ID[item.ss]; if (sid) { getM(sid)[pIdx] += 1; getM(sid).total += 1; } }
                if (item.gs) { const sid = SKILL_NAME_TO_ID[item.gs]; if (sid) { getM(sid)[pIdx] += 1; getM(sid).total += 1; } }
            });
            Object.entries(t.skills).forEach(([sid, pts]) => { getM(sid).talisman += pts; getM(sid).total += pts; });

            // 表示スキルの抽出 & ソート
            const activatedRows = Object.keys(matrix).filter(sid => {
                const s = SKILL_BY_ID[sid];
                if (!s) return false;
                if (s.mainCategory === 'series') return matrix[sid].total >= 2;
                if (s.mainCategory === 'group') return matrix[sid].total >= 3;
                return matrix[sid].total > 0;
            }).map(sid => {
                const s = SKILL_BY_ID[sid];
                const m = matrix[sid];
                let name = s.name;
                let lvl = Math.min(m.total, s.maxLevel || 10);
                let lvlText = `Lv${lvl}`;

                if (s.mainCategory === 'series') {
                    const slvl = (m.total >= 4) ? 2 : (m.total >= 2 ? 1 : 0);
                    const effect = s.effects.find(e => e.level === slvl);
                    name = effect ? effect.name : s.name;
                    lvlText = `Lv${slvl}`;
                    lvl = slvl;
                } else if (s.mainCategory === 'group') {
                    if (m.total >= 3) { name = s.effects[0].name; lvlText = "Lv1"; lvl = 1; }
                    else { name = s.name + " (未発動)"; lvlText = "-"; lvl = 0; }
                }
                return { id: sid, name, lvl, lvlText, cat: s.mainCategory || 'support', m };
            }).sort((a,b) => {
                const sA = SKILL_BY_ID[a.id];
                const sB = SKILL_BY_ID[b.id];
                const catPoints = { 'weapon': 1, 'armor': 2, 'series': 3, 'group': 4, 'support': 2, 'resistance': 2 };
                const pA = catPoints[a.cat] || 2;
                const pB = catPoints[b.cat] || 2;
                if (pA !== pB) return pA - pB;
                if (a.lvl !== b.lvl) return b.lvl - a.lvl;
                return SKILLS.indexOf(sA) - SKILLS.indexOf(sB);
            });

            // HTML生成
            const getDecosHtml = (pid) => {
                return assignment.filter(d => d.piece === pid)
                    .map(d => `<div class="slots-row"><span class="slot-box">[${d.deco.sl || d.deco.lvl}]</span> <span class="deco-label">${d.deco.n || d.deco.name}</span></div>`)
                    .join('');
            };

            const getPieceHtml = (label, name, item, pid) => {
                const tags = [];
                if (item.sk) item.sk.forEach(s => tags.push(`<span class="piece-skill-label">${s.n} Lv${s.l}</span>`));
                if (item.ss) tags.push(`<span class="piece-skill-label special-ss">[S] ${item.ss}</span>`);
                if (item.gs) tags.push(`<span class="piece-skill-label special-gs">[G] ${item.gs}</span>`);
                
                return `
                <div class="equip-item">
                    <div class="equip-label">${label}</div>
                    <div class="equip-name">${name}</div>
                    <div class="equip-sub">防: ${item.d || '--'} 耐: ${item.r?.join('/') || '--/--/--/--/--'}</div>
                    <div class="native-skills">${tags.join(' ')}</div>
                    <div class="slots-stack">${getDecosHtml(pid)}</div>
                </div>`;
            };

            const weaponSkillsTags = [];
            if (autoSS) weaponSkillsTags.push(`<span class="piece-skill-label special-ss">[S] ${SKILL_BY_ID[autoSS].name}</span>`);
            if (autoGS) weaponSkillsTags.push(`<span class="piece-skill-label special-gs">[G] ${SKILL_BY_ID[autoGS].name}</span>`);
            Object.entries(wSkills).forEach(([sid, pts]) => {
                 const s = SKILL_BY_ID[sid];
                 if (s) weaponSkillsTags.push(`<span class="piece-skill-label">${s.name} Lv${pts}</span>`);
            });

            card.innerHTML = `
                <div class="result-header">
                    <h1 class="set-id-tag">SET #VERIFY_TEST</h1>
                    <div class="defense-info">検証用表示 (URLパラメータからスキル設定可)</div>
                </div>
                <div class="result-body">
                    <div class="equipment-list">
                        <div class="equip-item">
                            <div class="equip-label">武</div>
                            <div class="equip-name">${weaponNameDisplay}</div>
                            <div class="native-skills">${weaponSkillsTags.join(' ')}</div>
                            <div class="slots-stack">${getDecosHtml('weapon')}</div>
                        </div>
                        ${getPieceHtml("頭", h.n, h, 0)}
                        ${getPieceHtml("胴", c.n, c, 1)}
                        ${getPieceHtml("腕", a.n, a, 2)}
                        ${getPieceHtml("腰", w.n, w, 3)}
                        ${getPieceHtml("脚", l.n, l, 4)}
                        ${getPieceHtml("石", t.name || "護石", {d:0, r:[0,0,0,0,0], sk: Object.entries(t.skills).map(([sid,pts])=>({n:SKILL_BY_ID[sid].name, l:pts}))}, 'talisman')}
                    </div>
                    <div class="totals-panel">
                        <table class="skill-table">
                            <thead>
                                <tr>
                                    <th class="skill-name-cell">スキル合計</th>
                                    <th>武</th><th>頭</th><th>胴</th><th>腕</th><th>腰</th><th>脚</th><th>石</th>
                                    <th style="color:var(--skill-lv-color)">計</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${activatedRows.map(row => `
                                    <tr>
                                        <td class="skill-name-cell">${row.name}</td>
                                        <td class="${row.m.weapon===0?'val-none':''}">${row.m.weapon||'-'}</td>
                                        <td class="${row.m[0]===0?'val-none':''}">${row.m[0]||'-'}</td>
                                        <td class="${row.m[1]===0?'val-none':''}">${row.m[1]||'-'}</td>
                                        <td class="${row.m[2]===0?'val-none':''}">${row.m[2]||'-'}</td>
                                        <td class="${row.m[3]===0?'val-none':''}">${row.m[3]||'-'}</td>
                                        <td class="${row.m[4]===0?'val-none':''}">${row.m[4]||'-'}</td>
                                        <td class="${row.m.talisman===0?'val-none':''}">${row.m.talisman||'-'}</td>
                                        <td class="total-cell">${row.lvlText}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            resultsContainer.appendChild(card);
        }

        // URLパラメータのパース
        const params = new URLSearchParams(window.location.search);
        const injectedSkills = {};
        params.forEach((val, key) => {
            // ID -> 名前 -> エフェクト名の順で検索
            let s = SKILL_BY_ID[key] || SKILLS.find(sk => sk.name === key);
            
            if (!s) {
                // 特殊スキル名 (恨撃 I など) からの逆引き
                s = SKILLS.find(sk => sk.effects && sk.effects.some(e => e.name === key));
            }

            if (s) {
                 let pts = parseInt(val);
                 if (s.mainCategory === 'series') {
                     // 1=2pts(Lv1), 2=4pts(Lv2)
                     if (pts === 1) pts = 2; else if (pts === 2) pts = 4;
                 }
                 else if (s.mainCategory === 'group') {
                     if (pts >= 1 && pts < 3) pts = 3;
                 }
                 injectedSkills[s.id] = pts;
            }
        });

        // ダミーデータで実行 (お守りに全スキルを集約)
        const empty = { n: "----", sk: [], d: 0, r:[0,0,0,0,0] };
        renderResult(
            empty, empty, empty, empty, empty, 
            { name: "検証用お守り", skills: injectedSkills },
            [], {}, [], 1, null, null
        );

    </script>
</body>
</html>
